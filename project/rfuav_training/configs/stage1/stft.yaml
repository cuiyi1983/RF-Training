# Stage1 STFT 配置
# ⚠️ 本文件已废弃，请参考 pluto_stft.yaml

stft:
  sample_rate: 60000000   # 60MHz（Pluto）
  nperseg: 1024
  hop: 512
  window: hamming
  return_onesided: false
  fftshift: true
  amp_type: dB             # 10*log10(|Zxx|)，与 RFUAV 官方一致
  normalize: minmax01      # 0-1 归一化
  target_shape: [1024, 1170]
  resize: [640, 640]      # YOLO 输入尺寸
