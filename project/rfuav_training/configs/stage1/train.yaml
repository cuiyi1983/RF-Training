# Stage1 YOLO 训练配置
# ⚠️ 本文件已废弃，请参考 TRAINING_GUIDE.md

# ========== 数据集路径 ==========
data:
  train: /mnt/data/rfuav/yolo_dataset/images/train/
  val:   /mnt/data/rfuav/yolo_dataset/images/val/

# ========== 模型配置 ==========
model:
  name: yolov5s             # YOLOv5s（Ultralytics）
  num_classes: 1            # drone only（无检测=无无人机）
  pretrained: coco           # COCO 预训练权重

# ========== 训练超参数 ==========
train:
  batch_size: 16
  image_size: 640
  epochs: 300               # 最大训练轮数
  patience: 20              # 早停：连续20个epoch无提升则停止
  save_period: 10           # 每10个epoch保存一次
  lr: 0.01
  optimizer: adam
  device: cuda
  save_path: ./outputs/stage1/
  shuffle: true
