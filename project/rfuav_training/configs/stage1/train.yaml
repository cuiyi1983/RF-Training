# Stage 1 训练配置
# 继承 RFUAV 官方 ResNet50 训练流程，针对 Pluto 频谱图适配

# ========== 数据集路径 ==========
data:
  train: /mnt/data/rfuav/dataset_v5_final/train/
  val:   /mnt/data/rfuav/dataset_v5_final/val/

# ========== 模型配置 ==========
model:
  name: resnet50            # RFUAV 官方 baseline 模型
  num_classes: 2             # Stage1 二分类：drone / noise
  pretrained: true          # ImageNet 预训练权重

# ========== 训练超参数 ==========
train:
  batch_size: 8
  image_size: 640           # YOLO 模式
  epochs: 150
  lr: 0.00001               # RFUAV 官方学习率
  optimizer: adam
  device: cuda
  save_path: ./outputs/stage1/
  shuffle: true
