# Stage1 训练配置

# 训练数据
data_dir: /mnt/data/rfuav/dataset_v5_final
train_dir: train
val_dir: val

# 模型
model: yolov8n       # YOLOv8n（轻量）
imgsz: 640

# 训练超参数
epochs: 100
batch: 32
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
box: 0.05
cls: 0.5
obj: 1.0

# 设备
device: 0           # GPU 0
workers: 8

# 输出
project: /mnt/data/rfuav/output
name: stage1_yolo
